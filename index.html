<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PUTZ Official</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Courier New', monospace;
}

html,body{
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center, #0f2027, #000000);
}

/* PUTZ pojok kanan */
.putz{
    position:absolute;
    top:20px;
    right:30px;
    font-size:28px;
    font-weight:bold;
    color:#00f0ff;
    text-shadow:
        0 0 5px #00f0ff,
        0 0 20px #00f0ff,
        0 0 40px #00f0ff;
    animation: glitch 2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(1px,-1px);}
    40%{transform:translate(-1px,1px);}
    60%{transform:translate(1px,1px);}
    80%{transform:translate(-1px,-1px);}
    100%{transform:translate(0);}
}

/* Center container */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* Tombol merah besar */
.enter-box{
    padding:50px 80px;
    border:4px solid red;
    color:red;
    font-size:45px;
    font-weight:bold;
    cursor:pointer;
    letter-spacing:4px;
    transition:0.3s;
    text-shadow:
        0 0 10px red,
        0 0 30px red,
        0 0 60px red;
    animation:pulse 1.5s infinite;
}

/* Efek pulse */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* Hover */
.enter-box:hover{
    background:red;
    color:black;
    box-shadow:0 0 60px red;
}

/* Main content */
.main{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#00f0ff;
    font-size:42px;
    text-shadow:0 0 30px #00f0ff;
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translate(-50%,-50%) scale(0.8);}
    to{opacity:1; transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>
<body>

<div class="putz">PUTZ</div>

<div class="center" id="welcome">
    <div class="enter-box" onclick="enterWeb()">
        Masuk ke dalam web
    </div>
</div>

<div class="main" id="main">
    SELAMAT DATANG DI WEB PUTZ 😈
</div>

<script>
function enterWeb(){
    document.getElementById("welcome").style.display="none";
    document.getElementById("main").style.display="block";
}

/* Disable zoom iOS */
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});
</script>

</body>
</html>
