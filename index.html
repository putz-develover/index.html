<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Background</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
}

/* VIDEO BACKGROUND */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* OVERLAY */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
    text-align:center;
    cursor:pointer;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<video id="bgVideo" loop>
    <source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<div id="overlay">Ketuk Untuk Masuk</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bgVideo");

overlay.addEventListener("click", () => {
    video.play();
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
    }, 1000);
});
</script>

</body>
</html>
