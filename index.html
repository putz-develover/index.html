<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUTZ Official</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Courier New', monospace;
}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    color:white;
    transition:1s;
}

/* Background animasi */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#00f0ff 0%,#000 60%);
    animation:bgMove 10s linear infinite;
    opacity:0.15;
}

@keyframes bgMove{
    0%{transform:translate(0,0);}
    50%{transform:translate(-25%,-25%);}
    100%{transform:translate(0,0);}
}

/* PUTZ pojok kanan */
.putz{
    position:absolute;
    top:20px;
    right:30px;
    font-size:28px;
    font-weight:bold;
    color:#00f0ff;
    text-shadow:
        0 0 5px #00f0ff,
        0 0 15px #00f0ff,
        0 0 30px #00f0ff;
    animation:flicker 1.5s infinite alternate;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}

/* Tengah */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.enter-btn{
    font-size:30px;
    padding:15px 40px;
    border:2px solid #00f0ff;
    color:#00f0ff;
    cursor:pointer;
    transition:0.3s;
}

.enter-btn:hover{
    background:#00f0ff;
    color:black;
    box-shadow:0 0 20px #00f0ff;
}

/* Konten utama (hidden dulu) */
.main-content{
    display:none;
    text-align:center;
    animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

.main-content h1{
    font-size:40px;
    color:#00f0ff;
    text-shadow:0 0 20px #00f0ff;
}
</style>
</head>
<body>

<div class="putz">PUTZ</div>

<div class="center" id="welcome">
    <div class="enter-btn" onclick="enterWeb()">Masuk ke dalam web</div>
</div>

<div class="center main-content" id="main">
    <h1>SELAMAT DATANG DI WEB PUTZ 😈</h1>
</div>

<script>
function enterWeb(){
    document.getElementById("welcome").style.display="none";
    document.getElementById("main").style.display="block";
}
</script>

</body>
</html>
