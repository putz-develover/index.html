<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Animasi</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* Video Background */
#bgVideo {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -1;
}

/* Overlay Masuk */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 28px;
    cursor: pointer;
    text-align: center;
    transition: opacity 1s ease;
}

#overlay:hover {
    background: rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<!-- Video Background -->
<video id="bgVideo" loop>
    <source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<!-- Overlay Ketuk -->
<div id="overlay">
    Ketuk Untuk Masuk
</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bgVideo");

overlay.addEventListener("click", () => {
    video.play(); // mulai video + audio
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
    }, 1000);
});
</script>

</body>
</html>
