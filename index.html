<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Background</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* OVERLAY MASUK */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<!-- VIDEO -->
<video id="bg-video" loop playsinline>
    <source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<!-- TOMBOL MASUK -->
<div id="overlay">Klik Untuk Masuk</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bg-video");

overlay.addEventListener("click", () => {
    video.muted = false;   // aktifkan suara
    video.play();          // mulai video + audio
    overlay.style.opacity = "0";
    
    setTimeout(() => {
        overlay.style.display = "none";
    }, 1000);
});
</script>

</body>
</html>
