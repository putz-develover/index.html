<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUTZ Official</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Courier New', monospace;
}

html,body{
height:100%;
overflow:hidden;
background:black;
}

/* Layar awal */
.start-screen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:red;
font-size:22px;
text-align:center;
z-index:9999;
}

/* Video nanti dibuat lewat JS */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Overlay */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
z-index:-1;
}

/* PUTZ */
.putz{
position:absolute;
top:20px;
right:30px;
font-size:22px;
color:#00f0ff;
text-shadow:0 0 10px #00f0ff;
}

/* Login */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.login-box{
padding:25px 30px;
border:2px solid red;
box-shadow:0 0 15px red;
background:rgba(0,0,0,0.4);
}

.login-box input{
width:200px;
padding:8px;
margin:8px 0;
background:transparent;
border:1px solid red;
color:red;
text-align:center;
}

.login-btn{
width:100%;
height:38px;
margin-top:8px;
border:1.5px solid red;
background:none;
color:red;
cursor:pointer;
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
TEKAN LAYAR UNTUK MASUK
</div>

<div class="overlay"></div>

<div class="putz">PUTZ</div>

<div class="center">
<div class="login-box">
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button class="login-btn">LOGIN</button>
</div>
</div>

<script>
const startScreen = document.getElementById("startScreen");

function startWebsite(){

// Buat video setelah disentuh
let video = document.createElement("video");
video.src = "ssstik.io_@rayy_senpai03_1772589528928.mp4";
video.autoplay = true;
video.loop = true;
video.playsInline = true;

document.body.appendChild(video);

startScreen.style.display = "none";
}

startScreen.addEventListener("click", startWebsite);
startScreen.addEventListener("touchstart", startWebsite);
</script>

</body>
</html>
