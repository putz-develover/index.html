<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PUTZ Official</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Courier New', monospace;
}

html,body{
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center, #0f2027, #000000);
}

/* PUTZ pojok kanan */
.putz{
    position:absolute;
    top:20px;
    right:30px;
    font-size:24px;
    font-weight:bold;
    color:#00f0ff;
    text-shadow:
        0 0 5px #00f0ff,
        0 0 20px #00f0ff;
}

/* Center container */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* Box login */
.login-box{
    padding:40px;
    border:2px solid red;
    box-shadow:0 0 20px red;
}

/* Input */
.login-box input{
    width:220px;
    padding:10px;
    margin:10px 0;
    background:black;
    border:1px solid red;
    color:red;
    text-align:center;
    outline:none;
}

.login-box input:focus{
    box-shadow:0 0 10px red;
}

/* Tombol login */
.login-btn{
    margin-top:10px;
    padding:10px 30px;
    border:2px solid red;
    background:none;
    color:red;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.login-btn:hover{
    background:red;
    color:black;
    box-shadow:0 0 20px red;
}

/* Main content */
.main{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#00f0ff;
    font-size:36px;
    text-shadow:0 0 20px #00f0ff;
}
</style>
</head>
<body>

<div class="putz">PUTZ</div>

<div class="center" id="login">
    <div class="login-box">
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button class="login-btn" onclick="login()">LOGIN</button>
    </div>
</div>

<div class="main" id="main">
    SELAMAT DATANG DI WEB PUTZ 😈
</div>

<script>
function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user !== "" && pass !== ""){
        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="block";
    } else {
        alert("Isi username dan password dulu!");
    }
}

/* Disable zoom iOS */
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});
</script>

</body>
</html>
