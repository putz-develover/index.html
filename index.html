<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PUTZ Official</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Courier New', monospace;
}

html,body{
    height:100%;
    overflow:hidden;
}

/* VIDEO BACKGROUND */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Overlay transparan */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* PUTZ pojok kanan */
.putz{
    position:absolute;
    top:20px;
    right:30px;
    font-size:22px;
    font-weight:bold;
    color:#00f0ff;
    text-shadow:0 0 10px #00f0ff;
}

/* Center */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* Login box */
.login-box{
    padding:25px 30px;
    border:2px solid red;
    box-shadow:0 0 15px red;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(4px);
}

/* Input */
.login-box input{
    width:200px;
    padding:8px;
    margin:8px 0;
    background:transparent;
    border:1px solid red;
    color:red;
    text-align:center;
    outline:none;
    font-size:14px;
}

.login-box input:focus{
    box-shadow:0 0 8px red;
}

/* Tombol LOGIN tengah sempurna */
.login-btn{
    margin-top:8px;
    width:100%;
    height:38px;
    border:1.5px solid red;
    background:none;
    color:red;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;

    display:flex;
    align-items:center;
    justify-content:center;
}

.login-btn:hover{
    background:red;
    color:black;
    box-shadow:0 0 15px red;
}

/* Main content */
.main{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#00f0ff;
    font-size:34px;
    text-shadow:0 0 20px #00f0ff;
}
</style>
</head>
<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
    <source src="ssstik.io_@entyywangyy_1772587495616.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="bgMusic" autoplay loop muted>
    <source src="ssstik.io_1772587505466.mp3" type="audio/mp3">
</audio>

<div class="overlay"></div>

<div class="putz">PUTZ</div>

<div class="center" id="login">
    <div class="login-box">
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button class="login-btn" onclick="login()">LOGIN</button>
    </div>
</div>

<div class="main" id="main">
    SELAMAT DATANG DI WEB PUTZ 😈
</div>

<script>
const music = document.getElementById("bgMusic");

/* Unmute setelah user sentuh layar (biar autoplay jalan di HP) */
document.addEventListener("click", function(){
    music.muted = false;
    music.play();
}, { once: true });

function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user !== "" && pass !== ""){
        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="block";
    } else {
        alert("Isi username dan password dulu!");
    }
}

/* Disable zoom iOS */
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});
</script>

</body>
</html>
