<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>PUTZ Official</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
background:black;
}

/* VIDEO FULL */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
background:black;
}

/* Overlay blur */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(3px);
z-index:-1;
}

/* PUTZ Neon */
.putz{
position:absolute;
top:20px;
right:25px;
font-size:22px;
font-weight:bold;
color:#ff0000;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #ff0000, 0 0 10px #ff0000; }
to{ text-shadow:0 0 20px #ff0000, 0 0 40px #ff0000; }
}

/* LOGIN CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translate(-50%,-60%);}
to{opacity:1; transform:translate(-50%,-50%);}
}

/* Glass login */
.login-box{
padding:30px;
width:270px;
border-radius:15px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,0,0,0.4);
box-shadow:0 0 25px rgba(255,0,0,0.7);
backdrop-filter:blur(8px);
text-align:center;
}

.login-box h2{
color:red;
margin-bottom:15px;
letter-spacing:2px;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
}

.login-btn{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:darkred;
}
</style>
</head>
<body>

<!-- VIDEO BACKGROUND -->
<video id="bgVideo" autoplay loop muted playsinline webkit-playsinline>
<source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="putz">PUTZ</div>

<div class="center">
<div class="login-box">
<h2>LOGIN</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button class="login-btn">MASUK</button>
</div>
</div>

<script>
const video = document.getElementById("bgVideo");

/* Aktifkan audio setelah 1 sentuhan */
function aktifkanAudio(){
video.muted = false;
video.play();
}

document.addEventListener("click", aktifkanAudio, { once:true });
document.addEventListener("touchstart", aktifkanAudio, { once:true });
</script>

</body>
</html>
