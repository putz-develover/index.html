<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Background</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:black;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* OVERLAY MASUK */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:opacity 1s ease;
    z-index:10;
}

/* NAMA PUTZ */
#nama{
    position:fixed;
    top:15px;
    right:20px;
    font-size:22px;
    font-weight:bold;
    z-index:5;

    background: linear-gradient(90deg, #00f, #00ffff, #0080ff, #00f);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: blueMove 4s linear infinite;
}

@keyframes blueMove {
    0% { background-position: 0% }
    100% { background-position: 300% }
}

/* LOGIN BOX */
.login-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:300px;
    padding:30px;
    border-radius:15px;

    background: rgba(0, 0, 255, 0.2); /* transparan biru */
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,255,0.6);

    text-align:center;
    color:white;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

.login-box button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0080ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-box button:hover{
    background:#00aaff;
}
</style>
</head>
<body>

<video id="bg-video" loop playsinline>
    <source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<div id="overlay">Klik Untuk Masuk</div>

<div id="nama">PUTZ</div>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Masuk</button>
</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bg-video");

overlay.addEventListener("click", () => {
    video.muted = false;
    video.play();
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
    }, 1000);
});
</script>

</body>
</html>
