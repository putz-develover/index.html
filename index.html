<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUTZ WEB</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Background Video */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.7);
}

/* Overlay Awal */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: opacity 1s ease;
}

.overlay h1 {
    color: white;
    font-size: 25px;
    letter-spacing: 3px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #00f2ff; }
}

/* Login Box */
.login-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    text-align: center;
    display: none;
}

.login-box h2 {
    color: white;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

.login-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #00f2ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    background: white;
}
</style>
</head>

<body>

<video id="bgVideo" loop>
    <source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<div class="overlay" id="overlay">
    <h1>TEKAN UNTUK MASUK</h1>
</div>

<div class="login-box" id="loginBox">
    <h2>LOGIN</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Masuk</button>
</div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("bgVideo");
const loginBox = document.getElementById("loginBox");

overlay.addEventListener("click", () => {
    video.play();
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
        loginBox.style.display = "block";
    }, 1000);
});
</script>

</body>
</html>
