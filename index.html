<!DOCTYPE html>
<html>
<head>
  <title>Play</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #330000, #000000);
    }

    #startBtn {
      font-size: 30px;
      padding: 25px 60px;
      background: red;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 0 30px red;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<button id="startBtn">TEKAN</button>

<audio id="audio" loop>
  <source src="ssstik.io_1772577051970.mp3" type="audio/mpeg">
</audio>

<script>
  const btn = document.getElementById("startBtn");
  const audio = document.getElementById("audio");

  btn.addEventListener("click", function() {
    audio.volume = 1.0; // maksimal di web
    audio.play();
    btn.style.display = "none";
  });

  // jaga-jaga kalau loop gagal
  audio.addEventListener("ended", function() {
    audio.currentTime = 0;
    audio.play();
  });
</script>

</body>
</html>
