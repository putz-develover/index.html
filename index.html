<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUTZ Official</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
background:black;
}

/* START SCREEN */
.start-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:red;
font-size:24px;
letter-spacing:3px;
z-index:9999;
cursor:pointer;
animation:pulse 1.5s infinite alternate;
}

@keyframes pulse{
from{opacity:0.6;}
to{opacity:1;}
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
background:black;
}

/* Overlay */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* PUTZ glow */
.putz{
position:absolute;
top:20px;
right:25px;
font-size:22px;
font-weight:bold;
color:#ff0000;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #ff0000; }
to{ text-shadow:0 0 25px #ff0000, 0 0 40px #ff0000; }
}

/* LOGIN */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.login-box{
width:260px;
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,0,0,0.5);
box-shadow:0 0 25px rgba(255,0,0,0.7);
backdrop-filter:blur(6px);
text-align:center;
}

.login-box h2{
color:red;
margin-bottom:15px;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
}

.login-btn{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:darkred;
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
TEKAN UNTUK MASUK
</div>

<video id="bgVideo" loop playsinline webkit-playsinline preload="auto">
<source src="ssstik.io_@rayy_senpai03_1772589528928.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="putz">PUTZ</div>

<div class="center">
<div class="login-box">
<h2>LOGIN</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button class="login-btn">MASUK</button>
</div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const video = document.getElementById("bgVideo");

function mulaiWebsite(){
video.play();
video.muted = false;
startScreen.style.display = "none";
}

startScreen.addEventListener("click", mulaiWebsite);
startScreen.addEventListener("touchstart", mulaiWebsite);
</script>

</body>
</html>
