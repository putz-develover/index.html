<!DOCTYPE html>
<html>
<head>
  <title>Play Sound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #startBtn {
      font-size: 28px;
      padding: 20px 50px;
      background: red;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button id="startBtn">TEKAN DISINI</button>

<audio id="audio" loop>
  <!-- Ganti link ini dengan file mp3 kamu -->
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
  const btn = document.getElementById("startBtn");
  const audio = document.getElementById("audio");

  btn.addEventListener("click", function() {
    audio.volume = 1.0; // maksimal di web
    audio.play();
    btn.style.display = "none"; // tombol hilang
  });
</script>

</body>
</html>
