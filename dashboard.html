<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUTZ DASHBOARD</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-1;
    transform:translateZ(0);
}

/* OVERLAY CLICK */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
    z-index:10;
}

/* WELCOME TEXT */
#welcome{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    opacity:0;
    transition:opacity 1s ease;
    text-shadow:0 0 20px red;
}

/* TOMBOL KEMBALI */
#backBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    padding:6px 15px;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    border-radius:20px;
    color:white;
    cursor:pointer;
    backdrop-filter:blur(5px);
}
</style>
</head>
<body>

<div id="overlay">Klik Disini Untuk Memulai</div>

<video id="bg-video" playsinline loop preload="auto">
    <source src="ssstik.io_@shizhii0_1772621148585.mp4" type="video/mp4">
</video>

<h1 id="welcome">WELCOME DI WEB PUTZ 🔥</h1>

<button id="backBtn" onclick="kembali()">Kembali</button>

<script>
/* CEK LOGIN */
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

const overlay = document.getElementById("overlay");
const video = document.getElementById("bg-video");
const welcome = document.getElementById("welcome");

/* KLIK UNTUK MULAI */
overlay.addEventListener("click", () => {

    overlay.style.display = "none";

    video.play().catch(()=>{});

    // delay 1 detik lalu tampilkan welcome
    setTimeout(()=>{
        welcome.style.opacity = "1";

        // hilang setelah 1 detik
        setTimeout(()=>{
            welcome.style.opacity = "0";
        },1000);

    },1000);

});

/* TOMBOL KEMBALI */
function kembali(){
    localStorage.removeItem("login"); // hapus status login
    window.location.href = "index.html"; // kembali ke menu login
}
</script>

</body>
</html>
