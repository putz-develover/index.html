<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUTZ DASHBOARD</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

/* VIDEO BACKGROUND HD */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-1;
    transform:translateZ(0);
    backface-visibility:hidden;
}

/* OVERLAY */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
    z-index:10;
}

/* WELCOME ANIMASI */
#welcome{
    position:absolute;
    top:50%;
    left:-100%;
    transform:translateY(-50%);
    font-size:42px;
    white-space:nowrap;
    opacity:0;
}

/* KEYFRAMES */
@keyframes slideGlow{
    0%{
        left:-100%;
        opacity:0;
        text-shadow:0 0 10px blue;
    }
    50%{
        opacity:1;
        text-shadow:0 0 20px cyan, 0 0 40px blue;
    }
    100%{
        left:50%;
        transform:translate(-50%,-50%);
        opacity:1;
        text-shadow:0 0 20px red, 0 0 40px orange;
    }
}

/* TOMBOL KEMBALI */
#backBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    padding:6px 15px;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    border-radius:20px;
    color:white;
    cursor:pointer;
    backdrop-filter:blur(5px);
}
</style>
</head>
<body>

<div id="overlay">Klik Disini Untuk Memulai</div>

<video id="bg-video" playsinline loop preload="auto">
    <source src="ssstik.io_1772664105001.mp4" type="video/mp4">
</video>

<h1 id="welcome">WELCOME DI WEB PUTZ 🔥</h1>

<button id="backBtn" onclick="kembali()">Kembali</button>

<script>
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

const overlay = document.getElementById("overlay");
const video = document.getElementById("bg-video");
const welcome = document.getElementById("welcome");

overlay.addEventListener("click", () => {

    overlay.style.display = "none";
    video.play().catch(()=>{});

    setTimeout(()=>{
        welcome.style.animation = "slideGlow 1s forwards";
    },500);

    setTimeout(()=>{
        welcome.style.opacity = "0";
    },2000);

});

function kembali(){
    localStorage.removeItem("login");
    window.location.href = "index.html";
}
</script>

</body>
</html>
