<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUTZ DASHBOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    padding-top:120px;
    font-family:Arial,sans-serif;
}

/* EFFECT JUDUL */
h1{
    font-size:40px;
    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px red, 0 0 20px red;
    }
    to{
        text-shadow:0 0 20px red, 0 0 40px red;
    }
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>WELCOME DI WEB PUTZ 🔥</h1>
<p>Kamu berhasil login</p>

<button onclick="logout()">Logout</button>

<script>
// CEK LOGIN
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

function logout(){
    localStorage.removeItem("login");
    window.location.href = "index.html";
}
</script>

</body>
</html>
