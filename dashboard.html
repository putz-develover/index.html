<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUTZ DASHBOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    padding-top:120px;
    font-family:Arial,sans-serif;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>WELCOME PUTZ 🔥</h1>
<p>Kamu berhasil login</p>
<button onclick="logout()">Logout</button>

<script>
// CEK LOGIN
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

function logout(){
    localStorage.removeItem("login");
    window.location.href = "index.html";
}
</script>

</body>
</html>
