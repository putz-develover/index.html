<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUTZ DASHBOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    display:none;
}

/* KLIK OVERLAY */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    cursor:pointer;
    z-index:10;
}

/* WELCOME */
#welcome{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    opacity:0;
    transition:opacity 1s ease;
}

/* LOGOUT */
#logout{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
    display:none;
}
</style>
</head>
<body>

<div id="overlay">Klik Untuk Masuk</div>

<video id="bg-video" loop playsinline>
    <source src="ssstik.io_@yanxymasihpemula_1772602646635.mp4" type="video/mp4">
</video>

<h1 id="welcome">WELCOME DI WEB PUTZ 🔥</h1>
<button id="logout" onclick="logout()">Logout</button>

<script>
// CEK LOGIN
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

const overlay = document.getElementById("overlay");
const video = document.getElementById("bg-video");
const welcome = document.getElementById("welcome");
const logoutBtn = document.getElementById("logout");

overlay.addEventListener("click", () => {

    overlay.style.display = "none";

    // tampilkan welcome
    welcome.style.opacity = "1";

    // play video (tidak akan ke blokir karena ada klik)
    video.style.display = "block";
    video.play().catch(()=>{});

    // 1 detik lalu hilangkan welcome
    setTimeout(()=>{
        welcome.style.opacity = "0";
        logoutBtn.style.display = "block";
    },1000);

});

function logout(){
    localStorage.removeItem("login");
    window.location.href = "index.html";
}
</script>

</body>
</html>
